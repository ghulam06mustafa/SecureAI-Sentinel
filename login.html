<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SecureAI Sentinel</title>
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .auth-page {
            min-height: calc(100vh - 72px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            background: radial-gradient(circle at top left, #153b73, #08111f 60%);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            padding: 34px;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .auth-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #172033;
        }

        .auth-card p {
            color: #64748b;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 7px;
            color: #172033;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 9px;
            font-size: 15px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #2563eb;
        }

        .auth-btn {
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 8px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 14px;
        }

        .auth-footer a {
            color: #2563eb;
            font-weight: 700;
        }

        .alert {
            display: none;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert.success {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="container nav-content">
        <div class="logo">
            <span class="logo-icon">🛡️</span>
            <span>SecureAI Sentinel</span>
        </div>

        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="login.html" class="active">Login</a>
            <a href="register.html" class="btn btn-small">Get Started</a>
        </nav>

        <button class="menu-btn" id="menuBtn">☰</button>
    </div>
</header>

<section class="auth-page">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p>Login to your AI cyber threat intelligence dashboard.</p>

        <div class="alert" id="loginAlert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="admin@company.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn auth-btn">Login</button>
        </form>

        <div class="auth-footer">
            Don’t have an account? <a href="register.html">Create account</a>
        </div>
    </div>
</section>

<script src="assets/js/main.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
