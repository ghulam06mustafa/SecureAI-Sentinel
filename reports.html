<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Incident Report | SecureAI Sentinel</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/app.css">

    <style>
        .report-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .report-document {
            background: #ffffff;
            border-radius: 18px;
            padding: 36px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .report-cover {
            border-bottom: 3px solid #2563eb;
            padding-bottom: 24px;
            margin-bottom: 28px;
        }

        .report-cover h1 {
            font-size: 34px;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .report-cover p {
            color: #475569;
            font-size: 15px;
        }

        .report-meta-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-top: 24px;
        }

        .meta-box {
            background: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .meta-box span {
            color: #64748b;
            font-size: 13px;
        }

        .meta-box strong {
            display: block;
            margin-top: 6px;
            font-size: 22px;
            color: #0f172a;
        }

        .report-section-title {
            font-size: 22px;
            color: #0f172a;
            margin: 30px 0 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }

        .summary-box {
            background: #f8fafc;
            border-left: 5px solid #2563eb;
            padding: 18px;
            border-radius: 10px;
            color: #334155;
            line-height: 1.7;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
        }

        .report-table th,
        .report-table td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        .report-table th {
            background: #f1f5f9;
            color: #0f172a;
        }

        .incident-card {
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 22px;
            margin-top: 22px;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .incident-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 14px;
            margin-bottom: 16px;
        }

        .incident-header h3 {
            color: #0f172a;
            font-size: 21px;
        }

        .incident-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .incident-grid p {
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 8px;
            margin: 0;
        }

        .incident-section {
            margin-top: 16px;
        }

        .incident-section h4 {
            color: #1e293b;
            margin-bottom: 6px;
        }

        .incident-section p {
            color: #334155;
            line-height: 1.7;
        }

        .report-footer {
            margin-top: 34px;
            padding-top: 18px;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 13px;
            text-align: center;
        }

        @media print {
            body {
                background: #ffffff !important;
            }

            .sidebar,
            .topbar,
            .report-toolbar,
            .logout-btn,
            .action-link,
            button {
                display: none !important;
            }

            .app-layout {
                display: block !important;
            }

            .main-content {
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }

            .panel {
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
            }

            .report-document {
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                padding: 20px !important;
            }

            .incident-card {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>

<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span>🛡️</span>
            <span>SecureAI Sentinel</span>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="upload-logs.html">📤 Upload Logs</a>
            <a href="threats.html">🚨 Threats</a>
            <a href="reports.html" class="active">📑 Reports</a>
            <a href="knowledge-base.html">🧠 Knowledge Base</a>
            <a href="settings.html">⚙️ Settings</a>
            <a href="index.html">🌐 Website</a>
        </nav>
    </aside>

    <main class="main-content">

        <div class="topbar">
            <div>
                <h1>Security Reports</h1>
                <p>Professional incident report generated from detected threats.</p>
            </div>

            <div class="user-box">
                <div class="user-info">
                    <strong id="userName">Admin</strong>
                    <span id="companyName">Organization</span>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="report-toolbar">
            <a href="threats.html" class="action-link">View Threats</a>
            <button class="btn" onclick="window.print()">Print / Save PDF</button>
        </div>

        <section class="report-document" id="reportDocument">
            Loading report...
        </section>

    </main>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/reports.js"></script>
</body>
</html>
